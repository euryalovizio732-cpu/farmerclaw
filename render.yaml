services:
  - type: web
    name: farmerclaw-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: farmerclaw-db
          property: connectionString
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: farmerclaw-db
    databaseName: farmerclaw
    user: farmerclaw
